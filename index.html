<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Atendimento WhatsApp - Evolution API</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:350px;background:#fff;border-right:1px solid #e0e0e0;display:flex;flex-direction:column}
.sidebar-header{padding:16px;border-bottom:1px solid #e0e0e0}
.sidebar-header h2{font-size:18px;display:flex;justify-content:space-between;align-items:center}
.search{padding:12px;border-bottom:1px solid #e0e0e0}
.search input{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px}
.tabs{display:flex;border-bottom:1px solid #e0e0e0}
.tab{flex:1;padding:10px;text-align:center;cursor:pointer;background:none;border:none;font-size:12px}
.tab.active{color:#075e54;border-bottom:2px solid #075e54}
.conv-list{flex:1;overflow-y:auto}
.conv-item{display:flex;align-items:center;padding:12px;cursor:pointer;border-bottom:1px solid #f0f0f0}
.conv-item:hover{background:#f5f5f5}
.conv-item.active{background:#e8f5e9}
.avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;margin-right:12px;flex-shrink:0}
.conv-info{flex:1;min-width:0}
.conv-name{font-weight:500;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-number{font-size:11px;color:#075e54;margin-top:2px;font-family:monospace}
.conv-badges{display:flex;gap:4px;margin-top:4px}
.badge{font-size:10px;padding:2px 6px;border-radius:4px}
.badge-pendente{background:#fff3cd;color:#856404}
.badge-ativo{background:#d4edda;color:#155724}
.badge-finalizado{background:#f8d7da;color:#721c24}
.main{flex:1;display:flex;flex-direction:column;background:#f0f2f5;min-width:0}
.chat-header{background:#fff;padding:12px 16px;border-bottom:1px solid #e0e0e0;display:flex;align-items:center;gap:12px}
.chat-info{flex:1;min-width:0}
.chat-name{font-weight:600;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-number{font-size:11px;color:#075e54;font-family:monospace}
.status-buttons{display:flex;gap:8px;flex-shrink:0}
.status-btn{padding:6px 12px;border:1px solid #ddd;border-radius:20px;cursor:pointer;font-size:11px;background:#fff}
.status-btn:hover{background:#f0f0f0}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.message{max-width:70%;padding:8px 12px;border-radius:12px;font-size:13px;word-break:break-word}
.message.out{background:#dcf8c6;align-self:flex-end}
.message.in{background:#fff;align-self:flex-start;border:1px solid #e0e0e0}
.input-area{padding:12px;background:#fff;border-top:1px solid #e0e0e0;display:flex;gap:8px}
.input-area textarea{flex:1;padding:10px;border:1px solid #ddd;border-radius:20px;resize:none;font-family:inherit;font-size:14px}
.input-area button{background:#075e54;color:#fff;border:none;border-radius:20px;padding:0 20px;cursor:pointer}
.right-panel{width:300px;background:#fff;border-left:1px solid #e0e0e0;padding:16px;overflow-y:auto;flex-shrink:0}
.right-panel h4{font-size:14px;margin-bottom:12px;color:#666}
.detail-row{margin-bottom:12px}
.detail-label{font-size:11px;color:#999;margin-bottom:2px}
.detail-value{font-size:12px;word-break:break-all;font-family:monospace}
.empty-state{display:flex;flex:1;align-items:center;justify-content:center;color:#999;flex-direction:column;gap:12px}
.loading{padding:20px;text-align:center;color:#999}
.spin{display:inline-block;width:20px;height:20px;border:2px solid #ddd;border-top-color:#075e54;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;background:#333;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;z-index:1000;opacity:0;transition:opacity 0.3s}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>💬 Atendimento <button onclick="loadChats()" style="background:none;border:none;cursor:pointer;font-size:16px">🔄</button></h2>
    </div>
    <div class="search">
      <input type="text" id="searchInput" placeholder="Buscar contato..." oninput="filterChats()">
    </div>
    <div class="tabs">
      <button class="tab active" onclick="setTab('all',this)">Todas</button>
      <button class="tab" onclick="setTab('pendente',this)">Pendentes</button>
      <button class="tab" onclick="setTab('em_atendimento',this)">Ativas</button>
      <button class="tab" onclick="setTab('finalizado',this)">Finalizadas</button>
    </div>
    <div class="conv-list" id="convList">
      <div class="loading"><div class="spin"></div><br>Carregando...</div>
    </div>
  </div>

  <div class="main">
    <div class="chat-header" id="chatHeader" style="display:none">
      <div class="avatar" id="headerAvatar" style="background:#ccc">--</div>
      <div class="chat-info">
        <div class="chat-name" id="chatName">-</div>
        <div class="chat-number" id="chatNumber">-</div>
      </div>
      <div class="status-buttons">
        <button class="status-btn" onclick="updateStatus('pendente')">⏳ Pendente</button>
        <button class="status-btn" onclick="updateStatus('em_atendimento')">▶ Atender</button>
        <button class="status-btn" onclick="updateStatus('finalizado')">✓ Finalizar</button>
      </div>
    </div>
    <div class="messages" id="messagesArea">
      <div class="empty-state"><div>💬</div><div>Selecione uma conversa</div></div>
    </div>
    <div class="input-area" id="inputArea" style="display:none">
      <textarea id="messageInput" placeholder="Digite sua mensagem..." rows="2" onkeydown="if(event.key=='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
      <button onclick="sendMessage()">Enviar 📤</button>
    </div>
  </div>

  <div class="right-panel">
    <h4>📋 Detalhes do Contato</h4>
    <div class="detail-row">
      <div class="detail-label">Nome</div>
      <div class="detail-value" id="detailName">-</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Número WhatsApp</div>
      <div class="detail-value" id="detailNumber" style="color:#075e54;font-weight:bold">-</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Remote JID (LID)</div>
      <div class="detail-value" id="detailJid" style="font-size:10px">-</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Tipo</div>
      <div class="detail-value" id="detailType">-</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Instância</div>
      <div class="detail-value">Novo teste</div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const BASE_URL = "https://evolution-api-pktx.srv1726422.hstgr.cloud";
const API_KEY = "BA6AD448919F-4C50-9C6D-67F36EFDDA95";
const INSTANCE = "Novo teste";

let chats = [];
let currentChat = null;
let currentFilter = '';
let currentTab = 'all';
let statusMap = JSON.parse(localStorage.getItem('chat_status') || '{}');

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show';
  setTimeout(() => toast.classList.remove('show'), 3000);
}

async function apiRequest(endpoint, method = 'POST', body = null) {
  const url = `${BASE_URL}${endpoint}`;
  const headers = { 'apikey': API_KEY, 'Content-Type': 'application/json' };
  const options = { method, headers };
  if (body) options.body = JSON.stringify(body);
  
  try {
    const resp = await fetch(url, options);
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.message || data.error || `HTTP ${resp.status}`);
    return data;
  } catch (err) {
    console.error(`Erro ${endpoint}:`, err);
    throw err;
  }
}

function extractRealNumber(chat) {
  // Prioridade 1: remoteJidAlt (tem o número real)
  if (chat.lastMessage?.key?.remoteJidAlt) {
    const altJid = chat.lastMessage.key.remoteJidAlt;
    return altJid.split('@')[0];
  }
  
  // Prioridade 2: se o remoteJid for @c.us ou @s.whatsapp.net
  const remoteJid = chat.remoteJid || chat.id || chat.jid;
  if (remoteJid && (remoteJid.includes('@c.us') || remoteJid.includes('@s.whatsapp.net'))) {
    return remoteJid.split('@')[0];
  }
  
  // Prioridade 3: retorna o LID (último recurso)
  return remoteJid?.split('@')[0] || '';
}

function getContactName(chat) {
  if (chat.pushName && chat.pushName !== 'null' && chat.pushName) return chat.pushName;
  if (chat.name && chat.name !== 'null') return chat.name;
  if (chat.senderName) return chat.senderName;
  
  const number = extractRealNumber(chat);
  if (number && number.length >= 10) {
    return formatPhoneNumber(number);
  }
  return 'Contato WhatsApp';
}

// CARREGAR CHATS
async function loadChats() {
  try {
    console.log('🚀 Carregando chats...');
    const encoded = encodeURIComponent(INSTANCE);
    const data = await apiRequest(`/chat/findChats/${encoded}`, 'POST', { where: {} });
    
    let rawChats = [];
    if (Array.isArray(data)) rawChats = data;
    else if (data?.records) rawChats = data.records;
    else if (data?.chats) rawChats = data.chats;
    
    console.log(`📦 ${rawChats.length} chats encontrados`);
    
    chats = rawChats.map(chat => {
      const realNumber = extractRealNumber(chat);
      const displayName = getContactName(chat);
      const remoteJid = chat.remoteJid || chat.id || chat.jid;
      
      return {
        jid: remoteJid,
        number: realNumber,
        name: displayName,
        isBot: displayName === 'BOT',
        raw: chat
      };
    });
    
    // Remove duplicatas
    const unique = new Map();
    chats.forEach(c => { 
      if (c.number && !unique.has(c.number)) unique.set(c.number, c);
      else if (c.jid && !unique.has(c.jid)) unique.set(c.jid, c);
    });
    chats = Array.from(unique.values());
    
    console.log(`✅ ${chats.length} chats processados`);
    renderChatList();
    showToast(`${chats.length} conversas carregadas`);
    
  } catch (err) {
    console.error(err);
    document.getElementById('convList').innerHTML = `<div class="loading">❌ Erro: ${err.message}</div>`;
  }
}

function formatPhoneNumber(num) {
  if (!num) return '';
  const clean = num.replace(/\D/g, '');
  if (clean.length === 13 && clean.startsWith('55')) {
    return `+${clean.slice(0,2)} ${clean.slice(2,4)} ${clean.slice(4,9)} ${clean.slice(9)}`;
  }
  if (clean.length === 12 && clean.startsWith('55')) {
    return `+${clean.slice(0,2)} ${clean.slice(2,7)} ${clean.slice(7)}`;
  }
  if (clean.length === 11) {
    return `+55 ${clean.slice(0,2)} ${clean.slice(2,7)} ${clean.slice(7)}`;
  }
  return clean;
}

function renderChatList() {
  const container = document.getElementById('convList');
  let filtered = chats.filter(chat => {
    if (currentFilter && !chat.name.toLowerCase().includes(currentFilter.toLowerCase()) && 
        !chat.number.includes(currentFilter)) return false;
    const status = statusMap[chat.jid] || 'pendente';
    if (currentTab !== 'all' && status !== currentTab) return false;
    return true;
  });
  
  if (filtered.length === 0) {
    container.innerHTML = '<div class="loading">Nenhum contato encontrado</div>';
    return;
  }
  
  let html = '';
  filtered.forEach(chat => {
    const status = statusMap[chat.jid] || 'pendente';
    let statusClass = 'badge-pendente', statusText = 'Pendente';
    if (status === 'em_atendimento') { statusClass = 'badge-ativo'; statusText = 'Ativo'; }
    if (status === 'finalizado') { statusClass = 'badge-finalizado'; statusText = 'Finalizado'; }
    
    const bgColor = getAvatarColor(chat.jid);
    const isActive = currentChat?.jid === chat.jid;
    const formattedNumber = formatPhoneNumber(chat.number);
    
    html += `
      <div class="conv-item ${isActive ? 'active' : ''}" onclick="selectChat('${chat.jid.replace(/'/g, "\\'")}')">
        <div class="avatar" style="background:${bgColor}">${chat.name.substring(0,2).toUpperCase()}</div>
        <div class="conv-info">
          <div class="conv-name">${escapeHtml(chat.name)}</div>
          <div class="conv-number">${escapeHtml(formattedNumber)}</div>
          <div class="conv-badges">
            <span class="badge ${statusClass}">${statusText}</span>
          </div>
        </div>
      </div>
    `;
  });
  container.innerHTML = html;
}

function getAvatarColor(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = ((hash << 5) - hash) + str.charCodeAt(i);
  const colors = ['#9FE1CB', '#B5D4F4', '#FAC775', '#F4C0D1', '#D4E0FF'];
  return colors[Math.abs(hash) % colors.length];
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// SELECIONAR CHAT
async function selectChat(jid) {
  console.log(`🔍 Selecionando chat: ${jid}`);
  const chat = chats.find(c => c.jid === jid);
  if (!chat) {
    console.error('Chat não encontrado');
    return;
  }
  
  currentChat = chat;
  const formattedNumber = formatPhoneNumber(chat.number);
  
  // Atualizar header
  document.getElementById('chatHeader').style.display = 'flex';
  document.getElementById('inputArea').style.display = 'flex';
  document.getElementById('chatName').textContent = chat.name;
  document.getElementById('chatNumber').textContent = formattedNumber;
  
  // Atualizar painel direito
  document.getElementById('detailName').textContent = chat.name;
  document.getElementById('detailNumber').textContent = formattedNumber;
  document.getElementById('detailJid').textContent = chat.jid;
  document.getElementById('detailType').textContent = 'Contato Real';
  
  const bgColor = getAvatarColor(chat.jid);
  document.getElementById('headerAvatar').style.background = bgColor;
  document.getElementById('headerAvatar').textContent = chat.name.substring(0,2).toUpperCase();
  
  // Carregar mensagens
  document.getElementById('messagesArea').innerHTML = '<div class="loading"><div class="spin"></div><br>Carregando mensagens...</div>';
  await loadMessages(chat.jid);
  renderChatList();
}

// CARREGAR MENSAGENS - CORRIGIDO!
async function loadMessages(jid) {
  try {
    console.log(`📨 Buscando mensagens para JID: ${jid}`);
    const encoded = encodeURIComponent(INSTANCE);
    
    const data = await apiRequest(`/chat/findMessages/${encoded}`, 'POST', {
      where: { remoteJid: jid },
      limit: 100,
      order: [['createdAt', 'DESC']]
    });
    
    console.log('📦 Resposta da API:', data);
    
    let messages = [];
    
    // CORREÇÃO PRINCIPAL: O data.messages é um OBJETO, não um array
    if (data?.messages && typeof data.messages === 'object') {
      // Converte o objeto messages em array
      messages = Object.values(data.messages);
      console.log(`✅ Extraído ${messages.length} mensagens do objeto messages`);
    } 
    // Se for array direto
    else if (Array.isArray(data)) {
      messages = data;
      console.log(`✅ Array direto com ${messages.length} mensagens`);
    }
    // Se tiver records
    else if (data?.records && Array.isArray(data.records)) {
      messages = data.records;
      console.log(`✅ data.records com ${messages.length} mensagens`);
    }
    // Se tiver data
    else if (data?.data && Array.isArray(data.data)) {
      messages = data.data;
      console.log(`✅ data.data com ${messages.length} mensagens`);
    }
    else {
      console.warn('⚠️ Formato não reconhecido, tentando extrair qualquer array...');
      // Tenta encontrar qualquer array na resposta
      for (let key in data) {
        if (Array.isArray(data[key])) {
          messages = data[key];
          console.log(`✅ Encontrado array em "${key}" com ${messages.length} mensagens`);
          break;
        }
      }
    }
    
    if (!messages || messages.length === 0) {
      console.log('ℹ️ Nenhuma mensagem encontrada para este chat');
      document.getElementById('messagesArea').innerHTML = '<div class="empty-state">💬 Nenhuma mensagem ainda<br>Envie algo para começar!</div>';
      return;
    }
    
    // Ordena por timestamp (mais antigo primeiro para exibição)
    messages.sort((a, b) => {
      const timeA = a.messageTimestamp || a.timestamp || 0;
      const timeB = b.messageTimestamp || b.timestamp || 0;
      return timeA - timeB;
    });
    
    renderMessages(messages);
    
  } catch (err) {
    console.error('❌ Erro ao carregar mensagens:', err);
    document.getElementById('messagesArea').innerHTML = `<div class="empty-state">❌ Erro ao carregar mensagens<br><small>${err.message}</small></div>`;
    showToast(`Erro: ${err.message}`);
  }
}

function renderMessages(messages) {
  const container = document.getElementById('messagesArea');
  
  if (!messages || messages.length === 0) {
    container.innerHTML = '<div class="empty-state">💬 Nenhuma mensagem ainda<br>Envie algo para começar!</div>';
    return;
  }
  
  let html = '';
  
  for (const msg of messages) {
    // Determina se a mensagem foi enviada por mim
    const isFromMe = msg.key?.fromMe === true || msg.fromMe === true;
    const direction = isFromMe ? 'out' : 'in';
    
    // Extrai o texto da mensagem
    let text = '';
    
    if (msg.message) {
      text = msg.message.conversation || 
             msg.message.extendedTextMessage?.text || 
             msg.message.imageMessage?.caption ||
             (msg.message.imageMessage ? '📷 Imagem' : 
              msg.message.audioMessage ? '🎵 Áudio' : 
              msg.message.videoMessage ? '🎥 Vídeo' : 
              msg.message.documentMessage ? '📎 Documento' : '');
    } 
    
    if (!text && msg.text) text = msg.text;
    if (!text && msg.body) text = msg.body;
    if (!text && msg.content) text = msg.content;
    
    if (text && text !== '') {
      html += `<div class="message ${direction}">${escapeHtml(text)}</div>`;
    }
  }
  
  if (html === '') {
    container.innerHTML = '<div class="empty-state">📎 Apenas mensagens de mídia<br>Nenhum texto para exibir</div>';
  } else {
    container.innerHTML = html;
    container.scrollTop = container.scrollHeight;
  }
  
  console.log(`✅ Renderizadas ${messages.length} mensagens, ${html.split('message').length - 1} exibidas`);
}

// ENVIAR MENSAGEM
async function sendMessage() {
  if (!currentChat) {
    showToast('Selecione uma conversa primeiro');
    return;
  }
  
  const input = document.getElementById('messageInput');
  const text = input.value.trim();
  if (!text) return;
  
  console.log(`📤 Enviando para ${currentChat.number}: "${text}"`);
  
  try {
    const encoded = encodeURIComponent(INSTANCE);
    await apiRequest(`/message/sendText/${encoded}`, 'POST', {
      number: currentChat.number,
      text: text,
      delay: 1200
    });
    
    input.value = '';
    showToast('Mensagem enviada! ✅');
    
    // Adiciona mensagem temporariamente na tela
    const container = document.getElementById('messagesArea');
    if (container.innerHTML.includes('Nenhuma mensagem')) {
      container.innerHTML = '';
    }
    container.innerHTML += `<div class="message out">${escapeHtml(text)}</div>`;
    container.scrollTop = container.scrollHeight;
    
    // Recarrega mensagens para confirmar
    setTimeout(() => {
      if (currentChat) loadMessages(currentChat.jid);
    }, 2000);
    
  } catch (err) {
    console.error('❌ Erro ao enviar mensagem:', err);
    showToast(`Erro: ${err.message}`);
  }
}

function updateStatus(newStatus) {
  if (!currentChat) return;
  statusMap[currentChat.jid] = newStatus;
  localStorage.setItem('chat_status', JSON.stringify(statusMap));
  renderChatList();
  const statusText = {pendente:'Pendente', em_atendimento:'Em atendimento', finalizado:'Finalizado'}[newStatus];
  showToast(`Status: ${statusText}`);
}

function filterChats() {
  currentFilter = document.getElementById('searchInput').value;
  renderChatList();
}

function setTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderChatList();
}

// INICIAR
loadChats();

// Auto-refresh a cada 15 segundos
setInterval(() => { 
  loadChats(); 
  if (currentChat) loadMessages(currentChat.jid); 
}, 15000);
</script>
</body>
</html>
