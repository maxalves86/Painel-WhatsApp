<script>
const BASE_URL = "https://2.25.164.79:32770";
const API_KEY = "@Alvesm1986";
const INSTANCE_NAME = "evolution-api-pktx";

let convs = [];
let activeId = null;
let filterText = '';

const avatarColors=[{bg:'#9FE1CB',c:'#085041'},{bg:'#B5D4F4',c:'#0C447C'},{bg:'#FAC775',c:'#633806'}];
function avc(id){ 
    if(!id) return avatarColors[0];
    return avatarColors[id.charCodeAt(0) % avatarColors.length] || avatarColors[0]; 
}
function initials(n){ return n ? n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() : '??'; }

async function loadContacts() {
    try {
        // Adicionado cabeçalhos explícitos de CORS para o servidor liberar o sinal
        const resContacts = await fetch(`${BASE_URL}/chat/findContacts/${INSTANCE_NAME}`, {
            method: 'POST',
            mode: 'cors',
            headers: { 
                'Content-Type': 'application/json', 
                'apikey': API_KEY,
                'Accept': 'application/json'
            },
            body: JSON.stringify({})
        });
        
        if (!resContacts.ok) {
            console.error("Servidor recusou a resposta:", resContacts.status);
            return;
        }
        
        const data = await resContacts.json();
        
        if (Array.isArray(data)) {
            convs = data;
        } else if (data && data.records && Array.isArray(data.records)) {
            convs = data.records;
        } else {
            convs = [];
        }
        
        renderConvList();
    } catch (err) {
        console.error("Erro de conexão com a API da Hostinger:", err);
    }
}

function renderConvList(){
  const listContainer = document.getElementById('convList');
  if (!listContainer) return;

  const list = convs.filter(c => {
    if (!c) return false;
    const jid = c.id || c.remoteJid || c.jid || '';
    if(!jid) return false;
    const pureNum = jid.split('@')[0];
    const name = (c.name || c.pushName || pureNum).toLowerCase();
    return name.includes(filterText.toLowerCase()) || pureNum.includes(filterText);
  });

  let h='';
  list.forEach(c => {
    const jid = c.id || c.remoteJid || c.jid;
    if(!jid) return;
    
    const ac = avc(jid);
    const pureNum = jid.split('@')[0];
    const displayName = c.name || c.pushName || ("+" + pureNum);
    const safeName = displayName.replace(/'/g, "\\'").replace(/"/g, '\\"');
    
    h += `<div class="conv-item ${jid === activeId ? 'active' : ''}" onclick="selectConv('${jid}', '${safeName}')">
      <div class="conv-avatar" style="background:${ac.bg};color:${ac.c}">${initials(displayName)}</div>
      <div class="conv-body">
        <div class="conv-top">
          <span class="conv-name">${displayName}</span>
        </div>
        <div class="conv-phone" style="font-size:11px; color:#64748b; margin-top:2px;">+${pureNum}</div>
      </div>
    </div>`;
  });
  
  listContainer.innerHTML = h || '<div style="padding:24px 16px;text-align:center;font-size:13px;color:var(--color-text-secondary)">Nenhum contato ativo encontrado na instância.</div>';
}

async function selectConv(id, name){
  activeId = id;
  const pureNum = id.split('@')[0];
  const ac = avc(id);
  
  document.getElementById('mainAvatar').textContent = initials(name);
  document.getElementById('mainAvatar').style.background = ac.bg;
  document.getElementById('mainAvatar').style.color = ac.c;

  document.getElementById('mainName').textContent = name;
  document.getElementById('mainSub').textContent = `+${pureNum} • Conectado`;
  document.getElementById('rpName').textContent = name;
  document.getElementById('rpNum').textContent = `+${pureNum}`;

  renderConvList();

  try {
      const response = await fetch(`${BASE_URL}/chat/findMessages/${INSTANCE_NAME}`, {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'application/json', 'apikey': API_KEY },
          body: JSON.stringify({ "where": { "key": { "remoteJid": id } }, "limit": 30 })
      });
      const data = await response.json();
      const messages = Array.isArray(data) ? data : (data.records || data.messages || []);
      renderMsgs(messages);
  } catch(err) {
      console.error("Erro ao carregar mensagens:", err);
  }
}

function renderMsgs(messages){
  const area = document.getElementById('msgArea');
  if(!area) return;
  
  let h='';
  if(!Array.isArray(messages)) {
      area.innerHTML = '';
      return;
  }
  const ordered = [...messages].reverse();
  
  ordered.forEach(m=>{
    if(!m) return;
    const dir = m.key?.fromMe ? 'out' : 'in';
    let text = "";
    if (m.message) {
        text = m.message.conversation || m.message.extendedTextMessage?.text || m.message.imageMessage?.caption || m.content || m.body;
    } else {
        text = m.content || m.body || m.text;
    }
    if(!text) text = m.key?.fromMe ? "[Mensagem Enviada]" : "[Mídia Recebida]";
    
    h+=`<div class="msg-row ${dir}"><div class="msg msg-${dir}">${text}</div></div>`;
  });
  area.innerHTML=h;
  area.scrollTop=area.scrollHeight;
}

async function sendMsg(){
  const inp = document.getElementById('msgInput');
  const text = inp.value.trim();
  if(!text || !activeId) return;

  try {
      const response = await fetch(`${BASE_URL}/message/sendText/${INSTANCE_NAME}`, {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'application/json', 'apikey': API_KEY },
          body: JSON.stringify({
              "number": activeId.split('@')[0],
              "options": { "delay": 200, "presence": "composing" },
              "textMessage": { "text": text }
          })
      });

      if(response.ok) {
          inp.value = '';
          selectConv(activeId, document.getElementById('mainName').textContent);
      }
  } catch(err) {
      console.error("Erro ao enviar mensagem:", err);
  }
}

function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function filterConvs(v){filterText=v;renderConvList();}

setInterval(() => {
    if(activeId) {
        selectConv(activeId, document.getElementById('mainName').textContent);
    } else {
        loadContacts();
    }
}, 5000);

loadContacts();
</script>
