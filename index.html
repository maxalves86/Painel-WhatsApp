<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Atendimento WhatsApp - Evolution API</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:350px;background:#fff;border-right:1px solid #e0e0e0;display:flex;flex-direction:column}
.sidebar-header{padding:16px;border-bottom:1px solid #e0e0e0}
.sidebar-header h2{font-size:18px;display:flex;justify-content:space-between;align-items:center}
.search{padding:12px;border-bottom:1px solid #e0e0e0}
.search input{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px}
.tabs{display:flex;border-bottom:1px solid #e0e0e0}
.tab{flex:1;padding:10px;text-align:center;cursor:pointer;background:none;border:none;font-size:12px}
.tab.active{color:#075e54;border-bottom:2px solid #075e54}
.conv-list{flex:1;overflow-y:auto}
.conv-item{display:flex;align-items:center;padding:12px;cursor:pointer;border-bottom:1px solid #f0f0f0}
.conv-item:hover{background:#f5f5f5}
.conv-item.active{background:#e8f5e9}
.avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;margin-right:12px;flex-shrink:0}
.conv-info{flex:1;min-width:0}
.conv-name{font-weight:500;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-number{font-size:11px;color:#075e54;margin-top:2px;font-family:monospace}
.conv-badges{display:flex;gap:4px;margin-top:4px}
.badge{font-size:10px;padding:2px 6px;border-radius:4px}
.badge-pendente{background:#fff3cd;color:#856404}
.badge-ativo{background:#d4edda;color:#155724}
.badge-finalizado{background:#f8d7da;color:#721c24}
.main{flex:1;display:flex;flex-direction:column;background:#f0f2f5;min-width:0}
.chat-header{background:#fff;padding:12px 16px;border-bottom:1px solid #e0e0e0;display:flex;align-items:center;gap:12px}
.chat-info{flex:1;min-width:0}
.chat-name{font-weight:600;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-number{font-size:11px;color:#075e54;font-family:monospace}
.status-buttons{display:flex;gap:8px;flex-shrink:0}
.status-btn{padding:6px 12px;border:1px solid #ddd;border-radius:20px;cursor:pointer;font-size:11px;background:#fff}
.status-btn:hover{background:#f0f0f0}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.message{max-width:70%;padding:8px 12px;border-radius:12px;font-size:13px;word-break:break-word}
.message.out{background:#dcf8c6;align-self:flex-end}
.message.in{background:#fff;align-self:flex-start;border:1px solid #e0e0e0}
.message-media{max-width:70%;margin:4px 0}
.message-media.out{align-self:flex-end}
.message-media.in{align-self:flex-start}
.message-media img{max-width:100%;border-radius:12px;cursor:pointer}
.message-media audio{width:200px;border-radius:12px}
.message-media video{max-width:100%;border-radius:12px}
.input-area{padding:12px;background:#fff;border-top:1px solid #e0e0e0}
.input-tools{display:flex;gap:8px;margin-bottom:8px}
.tool-btn{background:none;border:none;cursor:pointer;padding:6px;border-radius:8px;font-size:18px}
.tool-btn:hover{background:#f0f0f0}
.input-row{display:flex;gap:8px}
.input-row textarea{flex:1;padding:10px;border:1px solid #ddd;border-radius:20px;resize:none;font-family:inherit;font-size:14px}
.input-row button{background:#075e54;color:#fff;border:none;border-radius:20px;padding:0 20px;cursor:pointer}
.file-input{display:none}
.preview-area{padding:8px;background:#f5f5f5;border-radius:8px;margin-top:8px;display:flex;align-items:center;gap:8px}
.preview-area img{max-height:60px;border-radius:8px}
.right-panel{width:300px;background:#fff;border-left:1px solid #e0e0e0;padding:16px;overflow-y:auto;flex-shrink:0}
.right-panel h4{font-size:14px;margin-bottom:12px;color:#666}
.detail-row{margin-bottom:12px}
.detail-label{font-size:11px;color:#999;margin-bottom:2px}
.detail-value{font-size:12px;word-break:break-all;font-family:monospace}
.empty-state{display:flex;flex:1;align-items:center;justify-content:center;color:#999;flex-direction:column;gap:12px}
.loading{padding:20px;text-align:center;color:#999}
.spin{display:inline-block;width:20px;height:20px;border:2px solid #ddd;border-top-color:#075e54;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;background:#333;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;z-index:1000;opacity:0;transition:opacity 0.3s}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>💬 Atendimento <button onclick="loadChats()" style="background:none;border:none;cursor:pointer;font-size:16px">🔄</button></h2>
    </div>
    <div class="search">
      <input type="text" id="searchInput" placeholder="Buscar contato..." oninput="filterChats()">
    </div>
    <div class="tabs">
      <button class="tab active" onclick="setTab('all',this)">Todas</button>
      <button class="tab" onclick="setTab('pendente',this)">Pendentes</button>
      <button class="tab" onclick="setTab('em_atendimento',this)">Ativas</button>
      <button class="tab" onclick="setTab('finalizado',this)">Finalizadas</button>
    </div>
    <div class="conv-list" id="convList">
      <div class="loading"><div class="spin"></div><br>Carregando...</div>
    </div>
  </div>

  <div class="main">
    <div class="chat-header" id="chatHeader" style="display:none">
      <div class="avatar" id="headerAvatar" style="background:#ccc">--</div>
      <div class="chat-info">
        <div class="chat-name" id="chatName">-</div>
        <div class="chat-number" id="chatNumber">-</div>
      </div>
      <div class="status-buttons">
        <button class="status-btn" onclick="updateStatus('pendente')">⏳ Pendente</button>
        <button class="status-btn" onclick="updateStatus('em_atendimento')">▶ Atender</button>
        <button class="status-btn" onclick="updateStatus('finalizado')">✓ Finalizar</button>
      </div>
    </div>
    <div class="messages" id="messagesArea">
      <div class="empty-state"><div>💬</div><div>Selecione uma conversa</div></div>
    </div>
    <div class="input-area" id="inputArea" style="display:none">
      <div class="input-tools">
        <button class="tool-btn" onclick="document.getElementById('imageInput').click()">📷 Imagem</button>
        <button class="tool-btn" onclick="document.getElementById('audioInput').click()">🎵 Áudio</button>
      </div>
      <div class="input-row">
        <textarea id="messageInput" placeholder="Digite sua mensagem..." rows="2" onkeydown="if(event.key=='Enter'&&!event.shiftKey){event.preventDefault();sendTextMessage()}"></textarea>
        <button onclick="sendTextMessage()">Enviar 📤</button>
      </div>
      <div id="previewArea" class="preview-area" style="display:none"></div>
    </div>
    <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="sendImage(this)">
    <input type="file" id="audioInput" accept="audio/*" style="display:none" onchange="sendAudio(this)">
  </div>

  <div class="right-panel">
    <h4>📋 Detalhes do Contato</h4>
    <div class="detail-row">
      <div class="detail-label">Nome</div>
      <div class="detail-value" id="detailName">-</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Número WhatsApp</div>
      <div class="detail-value" id="detailNumber" style="color:#075e54;font-weight:bold">-</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">ID da Conversa</div>
      <div class="detail-value" id="detailJid" style="font-size:10px">-</div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const BASE_URL = "https://evolution-api-pktx.srv1726422.hstgr.cloud";
const API_KEY = "BA6AD448919F-4C50-9C6D-67F36EFDDA95";
const INSTANCE = "Novo teste";

let chats = [];
let currentChat = null;
let currentFilter = '';
let currentTab = 'all';
let statusMap = JSON.parse(localStorage.getItem('chat_status') || '{}');

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show';
  setTimeout(() => toast.classList.remove('show'), 3000);
}

async function apiRequest(endpoint, method = 'POST', body = null) {
  const url = `${BASE_URL}${endpoint}`;
  const headers = { 'apikey': API_KEY, 'Content-Type': 'application/json' };
  const options = { method, headers };
  if (body) options.body = JSON.stringify(body);
  
  try {
    const resp = await fetch(url, options);
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.message || data.error || `HTTP ${resp.status}`);
    return data;
  } catch (err) {
    console.error(`Erro ${endpoint}:`, err);
    throw err;
  }
}

async function loadChats() {
  try {
    const encoded = encodeURIComponent(INSTANCE);
    const data = await apiRequest(`/chat/findChats/${encoded}`, 'POST', { where: {} });
    
    let rawChats = [];
    if (Array.isArray(data)) rawChats = data;
    else if (data?.records) rawChats = data.records;
    else if (data?.chats) rawChats = data.chats;
    
    const uniqueByNumber = new Map();
    
    rawChats.forEach(chat => {
      let number = '';
      if (chat.lastMessage?.key?.remoteJidAlt) {
        number = chat.lastMessage.key.remoteJidAlt.split('@')[0];
      } else {
        const remoteJid = chat.remoteJid || chat.id || chat.jid;
        number = remoteJid.split('@')[0];
      }
      
      let name = chat.pushName || chat.name || chat.senderName;
      if (!name || name === 'null') {
        name = formatPhoneNumber(number);
      }
      
      if (!uniqueByNumber.has(number)) {
        uniqueByNumber.set(number, {
          number: number,
          name: name
        });
      }
    });
    
    chats = Array.from(uniqueByNumber.values());
    renderChatList();
    showToast(`${chats.length} conversas carregadas`);
  } catch (err) {
    console.error(err);
  }
}

function formatPhoneNumber(num) {
  if (!num) return '';
  const clean = num.replace(/\D/g, '');
  if (clean.length === 11) {
    return `+55 ${clean.slice(0,2)} ${clean.slice(2,7)} ${clean.slice(7)}`;
  }
  return clean;
}

function renderChatList() {
  const container = document.getElementById('convList');
  let filtered = chats.filter(chat => {
    if (currentFilter && !chat.name.toLowerCase().includes(currentFilter.toLowerCase()) && 
        !chat.number.includes(currentFilter)) return false;
    const status = statusMap[chat.number] || 'pendente';
    if (currentTab !== 'all' && status !== currentTab) return false;
    return true;
  });
  
  if (filtered.length === 0) {
    container.innerHTML = '<div class="loading">Nenhum contato encontrado</div>';
    return;
  }
  
  let html = '';
  filtered.forEach(chat => {
    const status = statusMap[chat.number] || 'pendente';
    let statusClass = 'badge-pendente', statusText = 'Pendente';
    if (status === 'em_atendimento') { statusClass = 'badge-ativo'; statusText = 'Ativo'; }
    if (status === 'finalizado') { statusClass = 'badge-finalizado'; statusText = 'Finalizado'; }
    
    const bgColor = getAvatarColor(chat.number);
    const isActive = currentChat?.number === chat.number;
    const formattedNumber = formatPhoneNumber(chat.number);
    
    html += `
      <div class="conv-item ${isActive ? 'active' : ''}" onclick="selectChat('${chat.number}')">
        <div class="avatar" style="background:${bgColor}">${chat.name.substring(0,2).toUpperCase()}</div>
        <div class="conv-info">
          <div class="conv-name">${escapeHtml(chat.name)}</div>
          <div class="conv-number">${escapeHtml(formattedNumber)}</div>
          <div class="conv-badges">
            <span class="badge ${statusClass}">${statusText}</span>
          </div>
        </div>
      </div>
    `;
  });
  container.innerHTML = html;
}

function getAvatarColor(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = ((hash << 5) - hash) + str.charCodeAt(i);
  const colors = ['#9FE1CB', '#B5D4F4', '#FAC775', '#F4C0D1', '#D4E0FF'];
  return colors[Math.abs(hash) % colors.length];
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

async function selectChat(number) {
  const chat = chats.find(c => c.number === number);
  if (!chat) return;
  
  currentChat = chat;
  const formattedNumber = formatPhoneNumber(chat.number);
  
  document.getElementById('chatHeader').style.display = 'flex';
  document.getElementById('inputArea').style.display = 'flex';
  document.getElementById('chatName').textContent = chat.name;
  document.getElementById('chatNumber').textContent = formattedNumber;
  document.getElementById('detailName').textContent = chat.name;
  document.getElementById('detailNumber').textContent = formattedNumber;
  document.getElementById('detailJid').textContent = `${number}@s.whatsapp.net`;
  
  const bgColor = getAvatarColor(chat.number);
  document.getElementById('headerAvatar').style.background = bgColor;
  document.getElementById('headerAvatar').textContent = chat.name.substring(0,2).toUpperCase();
  
  document.getElementById('messagesArea').innerHTML = '<div class="loading"><div class="spin"></div><br>Carregando mensagens...</div>';
  await loadMessages(number);
  renderChatList();
}

// Função para extrair e exibir qualquer tipo de mensagem
function renderMessage(msg) {
  if (!msg || typeof msg !== 'object') return null;
  
  const isFromMe = msg.key?.fromMe === true || msg.fromMe === true;
  const direction = isFromMe ? 'out' : 'in';
  
  // Mensagem de texto
  let text = msg.message?.conversation || 
             msg.message?.extendedTextMessage?.text || 
             msg.text || msg.body || msg.content;
  
  if (text) {
    return `<div class="message ${direction}">${escapeHtml(text)}</div>`;
  }
  
  // Mensagem de imagem
  if (msg.message?.imageMessage) {
    const caption = msg.message.imageMessage.caption || '';
    const url = msg.message.imageMessage.url || '';
    return `
      <div class="message-media ${direction}">
        ${caption ? `<div class="message ${direction}" style="margin-bottom:4px">${escapeHtml(caption)}</div>` : ''}
        ${url ? `<img src="${url}" alt="Imagem" style="max-width:100%;border-radius:12px" onclick="window.open('${url}')">` : '📷 Imagem'}
      </div>
    `;
  }
  
  // Mensagem de áudio
  if (msg.message?.audioMessage) {
    const url = msg.message.audioMessage.url || '';
    return `
      <div class="message-media ${direction}">
        <audio controls src="${url}"></audio>
      </div>
    `;
  }
  
  // Mensagem de vídeo
  if (msg.message?.videoMessage) {
    const url = msg.message.videoMessage.url || '';
    return `
      <div class="message-media ${direction}">
        <video controls src="${url}" style="max-width:100%;border-radius:12px"></video>
      </div>
    `;
  }
  
  // Documento
  if (msg.message?.documentMessage) {
    const fileName = msg.message.documentMessage.fileName || 'Documento';
    return `<div class="message ${direction}">📎 ${escapeHtml(fileName)}</div>`;
  }
  
  // Sticker
  if (msg.message?.stickerMessage) {
    return `<div class="message ${direction}">🎨 Sticker</div>`;
  }
  
  // Localização
  if (msg.message?.locationMessage) {
    return `<div class="message ${direction}">📍 Localização</div>`;
  }
  
  // Contato
  if (msg.message?.contactMessage) {
    const name = msg.message.contactMessage.displayName || 'Contato';
    return `<div class="message ${direction}">👤 ${escapeHtml(name)}</div>`;
  }
  
  return null;
}

async function loadMessages(number) {
  try {
    const encoded = encodeURIComponent(INSTANCE);
    const data = await apiRequest(`/chat/findMessages/${encoded}`, 'POST', {
      where: { remoteJid: `${number}@s.whatsapp.net` },
      limit: 100
    });
    
    let messages = [];
    
    if (data?.messages?.records && Array.isArray(data.messages.records)) {
      messages = data.messages.records;
    } else if (data?.messages && typeof data.messages === 'object') {
      messages = Object.values(data.messages).filter(v => v && typeof v === 'object');
    } else if (Array.isArray(data)) {
      messages = data;
    }
    
    if (messages.length === 0) {
      document.getElementById('messagesArea').innerHTML = '<div class="empty-state">💬 Nenhuma mensagem encontrada</div>';
      return;
    }
    
    let html = '';
    for (const msg of messages) {
      const messageHtml = renderMessage(msg);
      if (messageHtml) html += messageHtml;
    }
    
    document.getElementById('messagesArea').innerHTML = html;
    document.getElementById('messagesArea').scrollTop = document.getElementById('messagesArea').scrollHeight;
    
  } catch (err) {
    console.error('❌ Erro:', err);
  }
}

// ENVIAR MENSAGEM DE TEXTO
async function sendTextMessage() {
  if (!currentChat) {
    showToast('Selecione uma conversa primeiro');
    return;
  }
  
  const input = document.getElementById('messageInput');
  const text = input.value.trim();
  if (!text) return;
  
  try {
    const encoded = encodeURIComponent(INSTANCE);
    await apiRequest(`/message/sendText/${encoded}`, 'POST', {
      number: currentChat.number,
      text: text,
      delay: 1200
    });
    
    input.value = '';
    showToast('Mensagem enviada! ✅');
    
    // Adiciona na tela imediatamente
    const container = document.getElementById('messagesArea');
    if (container.innerHTML.includes('Nenhuma mensagem')) container.innerHTML = '';
    container.innerHTML += `<div class="message out">${escapeHtml(text)}</div>`;
    container.scrollTop = container.scrollHeight;
    
    setTimeout(() => loadMessages(currentChat.number), 2000);
  } catch (err) {
    showToast(`Erro: ${err.message}`);
  }
}

// ENVIAR IMAGEM
async function sendImage(input) {
  if (!currentChat) {
    showToast('Selecione uma conversa primeiro');
    return;
  }
  
  const file = input.files[0];
  if (!file) return;
  
  showToast('Enviando imagem...');
  
  try {
    // Converter imagem para base64
    const reader = new FileReader();
    reader.onloadend = async function() {
      const base64 = reader.result.split(',')[1];
      
      const encoded = encodeURIComponent(INSTANCE);
      await apiRequest(`/message/sendMedia/${encoded}`, 'POST', {
        number: currentChat.number,
        media: base64,
        mimetype: file.type,
        fileName: file.name,
        caption: ''
      });
      
      showToast('Imagem enviada! ✅');
      input.value = '';
      setTimeout(() => loadMessages(currentChat.number), 2000);
    };
    reader.readAsDataURL(file);
  } catch (err) {
    showToast(`Erro: ${err.message}`);
  }
}

// ENVIAR ÁUDIO
async function sendAudio(input) {
  if (!currentChat) {
    showToast('Selecione uma conversa primeiro');
    return;
  }
  
  const file = input.files[0];
  if (!file) return;
  
  showToast('Enviando áudio...');
  
  try {
    const reader = new FileReader();
    reader.onloadend = async function() {
      const base64 = reader.result.split(',')[1];
      
      const encoded = encodeURIComponent(INSTANCE);
      await apiRequest(`/message/sendWhatsAppAudio/${encoded}`, 'POST', {
        number: currentChat.number,
        audio: base64
      });
      
      showToast('Áudio enviado! ✅');
      input.value = '';
      setTimeout(() => loadMessages(currentChat.number), 2000);
    };
    reader.readAsDataURL(file);
  } catch (err) {
    showToast(`Erro: ${err.message}`);
  }
}

function updateStatus(newStatus) {
  if (!currentChat) return;
  statusMap[currentChat.number] = newStatus;
  localStorage.setItem('chat_status', JSON.stringify(statusMap));
  renderChatList();
  const statusText = {pendente:'Pendente', em_atendimento:'Em atendimento', finalizado:'Finalizado'}[newStatus];
  showToast(`Status: ${statusText}`);
}

function filterChats() {
  currentFilter = document.getElementById('searchInput').value;
  renderChatList();
}

function setTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderChatList();
}

loadChats();
setInterval(() => { loadChats(); if (currentChat) loadMessages(currentChat.number); }, 15000);
</script>
</body>
</html>
