<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Atendimento WhatsApp - Evolution API</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:350px;background:#fff;border-right:1px solid #e0e0e0;display:flex;flex-direction:column}
.sidebar-header{padding:16px;border-bottom:1px solid #e0e0e0}
.sidebar-header h2{font-size:18px;display:flex;justify-content:space-between;align-items:center}
.search{padding:12px;border-bottom:1px solid #e0e0e0}
.search input{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px}
.tabs{display:flex;border-bottom:1px solid #e0e0e0}
.tab{flex:1;padding:10px;text-align:center;cursor:pointer;background:none;border:none;font-size:12px}
.tab.active{color:#075e54;border-bottom:2px solid #075e54}
.conv-list{flex:1;overflow-y:auto}
.conv-item{display:flex;align-items:center;padding:12px;cursor:pointer;border-bottom:1px solid #f0f0f0}
.conv-item:hover{background:#f5f5f5}
.conv-item.active{background:#e8f5e9}
.avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;margin-right:12px}
.conv-info{flex:1}
.conv-name{font-weight:500;font-size:14px}
.conv-number{font-size:11px;color:#666;margin-top:2px;font-family:monospace}
.conv-badges{display:flex;gap:4px;margin-top:4px}
.badge{font-size:10px;padding:2px 6px;border-radius:4px}
.badge-pendente{background:#fff3cd;color:#856404}
.badge-ativo{background:#d4edda;color:#155724}
.badge-finalizado{background:#f8d7da;color:#721c24}
.badge-bot{background:#e2e3ff;color:#4a2c99}
.main{flex:1;display:flex;flex-direction:column;background:#f0f2f5}
.chat-header{background:#fff;padding:12px 16px;border-bottom:1px solid #e0e0e0;display:flex;align-items:center;gap:12px}
.chat-info{flex:1}
.chat-name{font-weight:600;font-size:16px}
.chat-number{font-size:11px;color:#666;font-family:monospace}
.status-buttons{display:flex;gap:8px}
.status-btn{padding:6px 12px;border:1px solid #ddd;border-radius:20px;cursor:pointer;font-size:11px;background:#fff}
.status-btn:hover{background:#f0f0f0}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.message{max-width:70%;padding:8px 12px;border-radius:12px;font-size:13px}
.message.out{background:#dcf8c6;align-self:flex-end}
.message.in{background:#fff;align-self:flex-start;border:1px solid #e0e0e0}
.input-area{padding:12px;background:#fff;border-top:1px solid #e0e0e0;display:flex;gap:8px}
.input-area textarea{flex:1;padding:10px;border:1px solid #ddd;border-radius:20px;resize:none;font-family:inherit;font-size:14px}
.input-area button{background:#075e54;color:#fff;border:none;border-radius:20px;padding:0 20px;cursor:pointer}
.right-panel{width:300px;background:#fff;border-left:1px solid #e0e0e0;padding:16px;overflow-y:auto}
.right-panel h4{font-size:14px;margin-bottom:12px;color:#666}
.detail-row{margin-bottom:12px}
.detail-label{font-size:11px;color:#999;margin-bottom:2px}
.detail-value{font-size:12px;word-break:break-all;font-family:monospace}
.empty-state{display:flex;flex:1;align-items:center;justify-content:center;color:#999;flex-direction:column;gap:12px}
.loading{padding:20px;text-align:center;color:#999}
.spin{display:inline-block;width:20px;height:20px;border:2px solid #ddd;border-top-color:#075e54;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.debug-panel{background:#f5f5f5;padding:8px;font-size:10px;font-family:monospace;border-top:1px solid #ddd;max-height:120px;overflow:auto}
.toast{position:fixed;bottom:20px;right:20px;background:#333;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;z-index:1000;opacity:0;transition:opacity 0.3s}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>💬 Atendimento <button onclick="loadAll()" style="background:none;border:none;cursor:pointer">🔄</button></h2>
    </div>
    <div class="search">
      <input type="text" id="searchInput" placeholder="Buscar contato..." oninput="filterChats()">
    </div>
    <div class="tabs">
      <button class="tab active" onclick="setTab('all',this)">Todas</button>
      <button class="tab" onclick="setTab('pendente',this)">Pendentes</button>
      <button class="tab" onclick="setTab('em_atendimento',this)">Ativas</button>
      <button class="tab" onclick="setTab('finalizado',this)">Finalizadas</button>
    </div>
    <div class="conv-list" id="convList">
      <div class="loading"><div class="spin"></div><br>Carregando...</div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="chat-header" id="chatHeader" style="display:none">
      <div class="avatar" id="headerAvatar" style="background:#ccc">--</div>
      <div class="chat-info">
        <div class="chat-name" id="chatName">-</div>
        <div class="chat-number" id="chatNumber">-</div>
      </div>
      <div class="status-buttons">
        <button class="status-btn" onclick="updateStatus('pendente')">⏳ Pendente</button>
        <button class="status-btn" onclick="updateStatus('em_atendimento')">▶ Atender</button>
        <button class="status-btn" onclick="updateStatus('finalizado')">✓ Finalizar</button>
      </div>
    </div>
    <div class="messages" id="messagesArea">
      <div class="empty-state">
        <div>💬</div>
        <div>Selecione uma conversa</div>
      </div>
    </div>
    <div class="input-area" id="inputArea" style="display:none">
      <textarea id="messageInput" placeholder="Digite sua mensagem..." rows="2" onkeydown="if(event.key=='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
      <button onclick="sendMessage()">Enviar 📤</button>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <h4>📋 Detalhes</h4>
    <div class="detail-row">
      <div class="detail-label">Nome</div>
      <div class="detail-value" id="detailName">-</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Remote JID (Raw)</div>
      <div class="detail-value" id="detailJid" style="font-size:10px">-</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Número Extraído</div>
      <div class="detail-value" id="detailNumber">-</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Tipo</div>
      <div class="detail-value" id="detailType">-</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Instância</div>
      <div class="detail-value">Novo teste</div>
    </div>
    <div class="debug-panel" id="debugPanel">
      <strong>📡 Logs:</strong><br>
      Aguardando...
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// CONFIGURAÇÃO
const BASE_URL = "https://evolution-api-pktx.srv1726422.hstgr.cloud";
const API_KEY = "BA6AD448919F-4C50-9C6D-67F36EFDDA95";
const INSTANCE = "Novo teste";

// ESTADO
let chats = [];
let currentChat = null;
let currentFilter = '';
let currentTab = 'all';
let statusMap = JSON.parse(localStorage.getItem('chat_status') || '{}');

function addDebugLog(msg) {
  const panel = document.getElementById('debugPanel');
  const timestamp = new Date().toLocaleTimeString();
  panel.innerHTML += `<br>${timestamp} - ${msg}`;
  panel.scrollTop = panel.scrollHeight;
  console.log(msg);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show';
  setTimeout(() => toast.classList.remove('show'), 3000);
}

async function apiRequest(endpoint, method = 'POST', body = null) {
  const url = `${BASE_URL}${endpoint}`;
  const headers = { 'apikey': API_KEY, 'Content-Type': 'application/json' };
  const options = { method, headers };
  if (body) options.body = JSON.stringify(body);
  
  addDebugLog(`📡 ${method} ${endpoint}`);
  
  try {
    const resp = await fetch(url, options);
    const data = await resp.json();
    addDebugLog(`✅ Status ${resp.status}`);
    if (!resp.ok) throw new Error(data.message || data.error || `HTTP ${resp.status}`);
    return data;
  } catch (err) {
    addDebugLog(`❌ Erro: ${err.message}`);
    throw err;
  }
}

function extractNumber(jid) {
  if (!jid) return '';
  // Remove qualquer sufixo @...
  const cleaned = jid.split('@')[0];
  // Se for um ID que parece número (apenas dígitos e +)
  if (/^[\+\d]+$/.test(cleaned)) {
    return cleaned;
  }
  return jid;
}

// CARREGAR CHATS
async function loadChats() {
  try {
    addDebugLog('🚀 Iniciando loadChats()');
    const encoded = encodeURIComponent(INSTANCE);
    const data = await apiRequest(`/chat/findChats/${encoded}`, 'POST', { where: {} });
    
    addDebugLog(`📦 Dados recebidos: ${JSON.stringify(data).substring(0, 200)}...`);
    
    let rawChats = [];
    if (Array.isArray(data)) {
      rawChats = data;
      addDebugLog(`✅ É um array com ${data.length} itens`);
    } else if (data?.records) {
      rawChats = data.records;
      addDebugLog(`✅ É data.records com ${data.records.length} itens`);
    } else if (data?.chats) {
      rawChats = data.chats;
      addDebugLog(`✅ É data.chats com ${data.chats.length} itens`);
    } else {
      addDebugLog(`⚠️ Estrutura desconhecida: ${Object.keys(data)}`);
      rawChats = [];
    }
    
    // Mostrar estrutura do primeiro chat para debug
    if (rawChats.length > 0) {
      addDebugLog(`📋 Primeiro chat: ${JSON.stringify(rawChats[0])}`);
    }
    
    chats = rawChats.map(chat => {
      // Tentar diferentes formas de obter o remoteJid
      const jid = chat.remoteJid || chat.id || chat.jid || chat.remoteJidAlt || '';
      const number = extractNumber(jid);
      
      // Tentar diferentes formas de obter o nome
      const name = chat.name || chat.pushName || chat.senderName || chat.contactName || number;
      
      const isBot = name === 'BOT' || chat.pushName === 'BOT' || name?.toLowerCase().includes('bot');
      
      addDebugLog(`📞 Processando: JID=${jid} | Nome=${name} | Número=${number}`);
      
      return {
        jid: jid,
        number: number,
        name: name,
        isBot: isBot,
        rawData: chat
      };
    });
    
    // Remove duplicatas
    const unique = new Map();
    chats.forEach(c => { 
      if (c.jid && !unique.has(c.jid)) {
        unique.set(c.jid, c);
      }
    });
    chats = Array.from(unique.values());
    
    addDebugLog(`✅ ${chats.length} chats processados`);
    renderChatList();
    
    if (chats.length === 0) showToast('Nenhuma conversa encontrada');
    else showToast(`${chats.length} conversas carregadas`);
    
  } catch (err) {
    addDebugLog(`❌ ERRO FATAL: ${err.message}`);
    document.getElementById('convList').innerHTML = `<div class="loading">❌ Erro: ${err.message}</div>`;
  }
}

function renderChatList() {
  const container = document.getElementById('convList');
  let filtered = chats.filter(chat => {
    if (currentFilter && !chat.name.toLowerCase().includes(currentFilter.toLowerCase()) && !chat.number.includes(currentFilter)) return false;
    const status = statusMap[chat.jid] || 'pendente';
    if (currentTab !== 'all' && status !== currentTab) return false;
    return true;
  });
  
  if (filtered.length === 0) {
    container.innerHTML = '<div class="loading">Nenhum contato encontrado</div>';
    return;
  }
  
  let html = '';
  filtered.forEach(chat => {
    const status = statusMap[chat.jid] || 'pendente';
    let statusClass = 'badge-pendente';
    let statusText = 'Pendente';
    if (status === 'em_atendimento') { statusClass = 'badge-ativo'; statusText = 'Ativo'; }
    if (status === 'finalizado') { statusClass = 'badge-finalizado'; statusText = 'Finalizado'; }
    
    const bgColor = getAvatarColor(chat.jid);
    const isActive = currentChat?.jid === chat.jid;
    
    html += `
      <div class="conv-item ${isActive ? 'active' : ''}" onclick="selectChat('${chat.jid.replace(/'/g, "\\'")}')">
        <div class="avatar" style="background:${bgColor}">${chat.name.substring(0,2).toUpperCase()}</div>
        <div class="conv-info">
          <div class="conv-name">${chat.isBot ? '🤖 ' : ''}${escapeHtml(chat.name)}</div>
          <div class="conv-number">${escapeHtml(chat.number)}</div>
          <div class="conv-badges">
            <span class="badge ${statusClass}">${statusText}</span>
            ${chat.isBot ? '<span class="badge badge-bot">🤖 Bot</span>' : ''}
          </div>
        </div>
      </div>
    `;
  });
  container.innerHTML = html;
}

function getAvatarColor(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = ((hash << 5) - hash) + str.charCodeAt(i);
  const colors = ['#9FE1CB', '#B5D4F4', '#FAC775', '#F4C0D1', '#D4E0FF'];
  return colors[Math.abs(hash) % colors.length];
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// SELECIONAR CHAT
async function selectChat(jid) {
  addDebugLog(`🔍 Selecionando chat: ${jid}`);
  
  const chat = chats.find(c => c.jid === jid);
  if (!chat) {
    addDebugLog(`❌ Chat não encontrado para JID: ${jid}`);
    return;
  }
  
  currentChat = chat;
  addDebugLog(`✅ Chat selecionado: ${chat.name} | Número: ${chat.number}`);
  
  // Atualizar UI
  document.getElementById('chatHeader').style.display = 'flex';
  document.getElementById('inputArea').style.display = 'flex';
  document.getElementById('chatName').textContent = chat.isBot ? `🤖 ${chat.name}` : chat.name;
  document.getElementById('chatNumber').textContent = chat.number;
  document.getElementById('detailName').textContent = chat.name;
  document.getElementById('detailJid').textContent = chat.jid;
  document.getElementById('detailNumber').textContent = chat.number;
  document.getElementById('detailType').textContent = chat.isBot ? '🤖 Bot' : '👤 Contato';
  
  const bgColor = getAvatarColor(chat.jid);
  document.getElementById('headerAvatar').style.background = bgColor;
  document.getElementById('headerAvatar').textContent = chat.name.substring(0,2).toUpperCase();
  
  // Carregar mensagens
  document.getElementById('messagesArea').innerHTML = '<div class="loading"><div class="spin"></div><br>Carregando mensagens...</div>';
  await loadMessages(chat.jid);
  
  renderChatList();
}

async function loadMessages(jid) {
  try {
    addDebugLog(`📨 Buscando mensagens para: ${jid}`);
    const encoded = encodeURIComponent(INSTANCE);
    const data = await apiRequest(`/chat/findMessages/${encoded}`, 'POST', {
      where: { remoteJid: jid },
      limit: 50
    });
    
    addDebugLog(`📦 Resposta mensagens: ${JSON.stringify(data).substring(0, 200)}...`);
    
    let messages = [];
    if (data?.messages && Array.isArray(data.messages)) {
      messages = data.messages;
      addDebugLog(`✅ messages array com ${messages.length}`);
    } else if (Array.isArray(data)) {
      messages = data;
      addDebugLog(`✅ array direto com ${messages.length}`);
    } else if (data?.records && Array.isArray(data.records)) {
      messages = data.records;
      addDebugLog(`✅ records array com ${messages.length}`);
    } else {
      addDebugLog(`⚠️ Estrutura inesperada: ${Object.keys(data)}`);
      messages = [];
    }
    
    renderMessages(messages);
  } catch (err) {
    addDebugLog(`❌ Erro loadMessages: ${err.message}`);
    document.getElementById('messagesArea').innerHTML = '<div class="empty-state">❌ Erro ao carregar mensagens</div>';
  }
}

function renderMessages(messages) {
  const container = document.getElementById('messagesArea');
  
  if (!messages || messages.length === 0) {
    container.innerHTML = '<div class="empty-state">💬 Nenhuma mensagem ainda<br>Envie algo para começar!</div>';
    return;
  }
  
  let html = '';
  for (const msg of messages) {
    const isFromMe = msg.key?.fromMe === true || msg.fromMe === true;
    const direction = isFromMe ? 'out' : 'in';
    
    let text = msg.message?.conversation || 
               msg.message?.extendedTextMessage?.text || 
               msg.text || 
               msg.body || 
               msg.content;
               
    if (!text && msg.message?.imageMessage) text = '📷 Imagem';
    if (!text && msg.message?.audioMessage) text = '🎵 Áudio';
    if (!text && msg.message?.documentMessage) text = '📎 Documento';
    if (!text) text = isFromMe ? 'Mensagem enviada' : 'Mensagem recebida';
    
    html += `<div class="message ${direction}">${escapeHtml(text)}</div>`;
  }
  
  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;
  addDebugLog(`✅ ${messages.length} mensagens renderizadas`);
}

// ENVIAR MENSAGEM
async function sendMessage() {
  if (!currentChat) {
    showToast('Selecione uma conversa primeiro');
    return;
  }
  
  const input = document.getElementById('messageInput');
  const text = input.value.trim();
  if (!text) return;
  
  addDebugLog(`📤 Enviando para ${currentChat.number}: "${text}"`);
  
  try {
    const encoded = encodeURIComponent(INSTANCE);
    await apiRequest(`/message/sendText/${encoded}`, 'POST', {
      number: currentChat.number,
      text: text,
      delay: 1200
    });
    
    input.value = '';
    showToast('Mensagem enviada!');
    addDebugLog(`✅ Mensagem enviada com sucesso`);
    
    // Adicionar mensagem temporária
    const container = document.getElementById('messagesArea');
    if (container.innerHTML.includes('Nenhuma mensagem')) container.innerHTML = '';
    container.innerHTML += `<div class="message out">${escapeHtml(text)}</div>`;
    container.scrollTop = container.scrollHeight;
    
    // Recarregar mensagens
    setTimeout(() => loadMessages(currentChat.jid), 1500);
  } catch (err) {
    addDebugLog(`❌ Falha ao enviar: ${err.message}`);
    showToast(`Erro: ${err.message}`);
  }
}

// STATUS
function updateStatus(newStatus) {
  if (!currentChat) return;
  statusMap[currentChat.jid] = newStatus;
  localStorage.setItem('chat_status', JSON.stringify(statusMap));
  renderChatList();
  const statusText = newStatus === 'pendente' ? 'Pendente' : newStatus === 'em_atendimento' ? 'Em atendimento' : 'Finalizado';
  showToast(`Status: ${statusText}`);
  addDebugLog(`📝 Status alterado para ${statusText}`);
}

// FILTROS
function filterChats() {
  currentFilter = document.getElementById('searchInput').value;
  renderChatList();
}

function setTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderChatList();
}

async function loadAll() {
  showToast('Atualizando...');
  await loadChats();
  if (currentChat) await loadMessages(currentChat.jid);
}

// INICIAR
loadChats();

// Auto-refresh
setInterval(() => {
  loadChats();
  if (currentChat) loadMessages(currentChat.jid);
}, 15000);
</script>
</body>
</html>
