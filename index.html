<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Atendimento WhatsApp</title>
    <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--sidebar-w:280px;--right-w:260px;--font-sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;--color-border-tertiary: #e2e8f0;--color-background-primary: #ffffff;--color-background-secondary: #f8fafc;--color-text-primary: #0f172a;--color-text-secondary: #64748b;--border-radius-lg: 12px;--border-radius-md: 8px}
    body{font-family:var(--font-sans); padding: 20px; background: #f1f5f9;}
    .app{display:grid;grid-template-columns:var(--sidebar-w) 1fr var(--right-w);height:85vh;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;background:var(--color-background-primary)}
    .sidebar{border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;background:var(--color-background-secondary)}
    .sidebar-header{padding:14px 14px 10px;border-bottom:0.5px solid var(--color-border-tertiary)}
    .agent-pill{display:flex;align-items:center;gap:8px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:8px 10px;cursor:pointer}
    .agent-avatar{width:32px;height:32px;border-radius:50%;background:#185FA5;color:#E6F1FB;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
    .agent-info{flex:1;min-width:0}
    .agent-name{font-size:13px;font-weight:500;color:var(--color-text-primary)}
    .agent-status{font-size:11px;color:var(--color-text-secondary);display:flex;align-items:center;gap:4px}
    .dot-online{width:6px;height:6px;border-radius:50%;background:#3B6D11}
    .sidebar-tabs{display:flex;border-bottom:0.5px solid var(--color-border-tertiary)}
    .stab{flex:1;padding:8px 4px;font-size:12px;text-align:center;cursor:pointer;color:var(--color-text-secondary);border:none;background:none;border-bottom:2px solid transparent}
    .stab.active{color:#185FA5;border-bottom-color:#185FA5;font-weight:500}
    .conv-list{flex:1;overflow-y:auto}
    .conv-item{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;border-bottom:0.5px solid var(--color-border-tertiary);transition:background 0.15s}
    .conv-item:hover{background:var(--color-background-primary)}
    .conv-item.active{background:var(--color-background-primary);border-left:3px solid #185FA5}
    .conv-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0}
    .conv-body{flex:1;min-width:0}
    .conv-top{display:flex;justify-content:space-between;align-items:center}
    .conv-name{font-size:13px;font-weight:500;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
    .main{display:flex;flex-direction:column;background:var(--color-background-primary)}
    .chat-header{padding:12px 16px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:10px}
    .chat-header-info{flex:1}
    .chat-header-name{font-size:14px;font-weight:500;color:var(--color-text-primary)}
    .chat-header-sub{font-size:12px;color:var(--color-text-secondary)}
    .messages-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;background:#f8fafc}
    .msg-row{display:flex;width:100%}
    .msg-row.out{justify-content:flex-end}
    .msg-row.in{justify-content:flex-start}
    .msg{max-width:75%;padding:8px 12px;border-radius:var(--border-radius-lg);font-size:13px;line-height:1.5;box-shadow:0 1px 2px rgba(0,0,0,0.05)}
    .msg-in{background:var(--color-background-primary);color:var(--color-text-primary);border-bottom-left-radius:4px;border:0.5px solid var(--color-border-tertiary)}
    .msg-out{background:#185FA5;color:#E6F1FB;border-bottom-right-radius:4px}
    .input-area{padding:12px 16px;border-top:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;gap:8px}
    .input-row{display:flex;gap:8px;align-items:flex-end}
    .msg-input{flex:1;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:8px 12px;font-size:13px;resize:none;height:70px;font-family:var(--font-sans);background:var(--color-background-primary);color:var(--color-text-primary)}
    .msg-input:focus{outline:none;border-color:#185FA5}
    .send-btn{background:#185FA5;color:#E6F1FB;border:none;border-radius:var(--border-radius-lg);padding:0 24px;cursor:pointer;font-size:13px;font-weight:500;height:70px;display:flex;align-items:center;justify-content:center}
    .send-btn:hover{background:#0C447C}
    .right-panel{border-left:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;background:var(--color-background-secondary)}
    .rp-header{padding:12px 14px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px;font-weight:500;color:var(--color-text-primary)}
    .rp-section{padding:12px 14px;border-bottom:0.5px solid var(--color-border-tertiary)}
    .rp-label{font-size:11px;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.4px}
    .rp-val{font-size:13px;color:var(--color-text-primary)}
    .wnum-search{padding:8px 12px;border-bottom:0.5px solid var(--color-border-tertiary)}
    .wnum-search input{width:100%;padding:6px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);font-size:12px;background:var(--color-background-primary);color:var(--color-text-primary)}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
    </style>
</head>
<body>

<h2 class="sr-only">Painel de Atendimento WhatsApp</h2>

<div class="app" id="app">
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="agent-pill">
          <div class="agent-avatar">MA</div>
          <div class="agent-info">
            <div class="agent-name">Max Alves</div>
            <div class="agent-status"><span class="dot-online"></span> Online</div>
          </div>
        </div>
      </div>
      <div class="wnum-search">
        <input type="text" placeholder="Buscar por nome ou número..." oninput="filterConvs(this.value)" />
      </div>
      <div class="sidebar-tabs">
        <button class="stab active">Todas as Conversas</button>
      </div>
      <div class="conv-list" id="convList"></div>
    </div>

    <div class="main">
      <div class="chat-header">
        <div class="conv-avatar" id="mainAvatar" style="background:#e2e8f0;color:#64748b">--</div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="mainName">Nenhuma conversa selecionada</div>
          <div class="chat-header-sub" id="mainSub">Selecione um chat ao lado para começar</div>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;flex:1;overflow:hidden">
        <div class="messages-area" id="msgArea"></div>
        <div class="input-area">
          <div class="input-row">
            <textarea class="msg-input" id="msgInput" placeholder="Digite sua mensagem..." onkeydown="handleKey(event)"></textarea>
            <button class="send-btn" onclick="sendMsg()">Enviar</button>
          </div>
        </div>
      </div>
    </div>

    <div class="right-panel">
      <div class="rp-header">Ficha do Contato</div>
      <div class="rp-section">
        <div class="rp-label">Nome Registrado</div>
        <div class="rp-val" id="rpName">--</div>
        <div class="rp-label" style="margin-top:12px">Número do WhatsApp</div>
        <div class="rp-val" id="rpNum">--</div>
      </div>
    </div>
</div>

<script>
const BASE_URL = "http://2.25.164.79:32770";
const API_KEY = "@Alvesm1986";
const INSTANCE_NAME = "evolution-api-pktx";

let convs = [];
let activeId = null;
let filterText = '';

const avatarColors=[{bg:'#9FE1CB',c:'#085041'},{bg:'#B5D4F4',c:'#0C447C'},{bg:'#FAC775',c:'#633806'}];
function avc(id){ return avatarColors[id.charCodeAt(0) % avatarColors.length] || avatarColors[0]; }
function initials(n){ return n ? n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() : '??'; }

async function loadContacts() {
    try {
        const response = await fetch(`${BASE_URL}/chat/findLabels/${INSTANCE_NAME}`, {
            method: 'GET',
            headers: { 'apikey': API_KEY }
        }).catch(() => null);

        const resContacts = await fetch(`${BASE_URL}/chat/findContacts/${INSTANCE_NAME}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'apikey': API_KEY },
            body: JSON.stringify({})
        });
        const data = await resContacts.json();
        convs = Array.isArray(data) ? data : (data.records || []);
        renderConvList();
    } catch (err) {
        console.error("Erro ao carregar contatos da API:", err);
    }
}

function renderConvList(){
  const list = convs.filter(c => {
    if(!c || !c.id) return false;
    const pureNum = c.id.split('@')[0];
    const name = (c.name || c.pushName || pureNum).toLowerCase();
    return name.includes(filterText.toLowerCase()) || pureNum.includes(filterText);
  });

  let h='';
  list.forEach(c=>{
    const ac=avc(c.id);
    const pureNum = c.id.split('@')[0];
    const displayName = c.name || c.pushName || ("+" + pureNum);
    h+=`<div class="conv-item ${c.id===activeId?'active':''}" onclick="selectConv('${c.id}', '${displayName.replace(/'/g, "\\'")}')">
      <div class="conv-avatar" style="background:${ac.bg};color:${ac.c}">${initials(displayName)}</div>
      <div class="conv-body">
        <div class="conv-top">
          <span class="conv-name">${displayName}</span>
        </div>
      </div>
    </div>`;
  });
  document.getElementById('convList').innerHTML=h || '<div style="padding:24px 16px;text-align:center;font-size:13px;color:var(--color-text-secondary)">Nenhum contato encontrado...</div>';
}

async function selectConv(id, name){
  activeId = id;
  const pureNum = id.split('@')[0];
  const ac = avc(id);
  
  const mainAv = document.getElementById('mainAvatar');
  mainAv.textContent = initials(name);
  mainAv.style.background = ac.bg;
  mainAv.style.color = ac.c;

  document.getElementById('mainName').textContent = name;
  document.getElementById('mainSub').textContent = `+${pureNum} • Conectado`;
  document.getElementById('rpName').textContent = name;
  document.getElementById('rpNum').textContent = `+${pureNum}`;

  try {
      const response = await fetch(`${BASE_URL}/chat/findMessages/${INSTANCE_NAME}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': API_KEY },
          body: JSON.stringify({ "where": { "key": { "remoteJid": id } }, "limit": 30 })
      });
      const data = await response.json();
      const messages = Array.isArray(data) ? data : (data.records || data.messages || []);
      renderMsgs(messages);
  } catch(err) {
      console.error("Erro ao carregar mensagens:", err);
  }
}

function renderMsgs(messages){
  let h='';
  if(!Array.isArray(messages)) return;
  const ordered = [...messages].reverse();
  
  ordered.forEach(m=>{
    if(!m) return;
    const dir = m.key?.fromMe ? 'out' : 'in';
    
    let text = "";
    if (m.message) {
        text = m.message.conversation || m.message.extendedTextMessage?.text || m.message.imageMessage?.caption || m.content || m.body;
    } else {
        text = m.content || m.body || m.text;
    }
    
    if(!text) text = m.key?.fromMe ? "[Mensagem Enviada]" : "[Mídia Recebida]";
    
    h+=`<div class="msg-row ${dir}"><div class="msg msg-${dir}">${text}</div></div>`;
  });
  const area=document.getElementById('msgArea');
  area.innerHTML=h;
  area.scrollTop=area.scrollHeight;
}

async function sendMsg(){
  const inp = document.getElementById('msgInput');
  const text = inp.value.trim();
  if(!text || !activeId) return;

  try {
      const response = await fetch(`${BASE_URL}/message/sendText/${INSTANCE_NAME}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': API_KEY },
          body: JSON.stringify({
              "number": activeId.split('@')[0],
              "options": { "delay": 200, "presence": "composing" },
              "textMessage": { "text": text }
          })
      });

      if(response.ok) {
          inp.value = '';
          selectConv(activeId, document.getElementById('mainName').textContent);
      }
  } catch(err) {
      console.error("Erro ao enviar mensagem:", err);
  }
}

function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function filterConvs(v){filterText=v;renderConvList();}

setInterval(() => {
    if(activeId) {
        selectConv(activeId, document.getElementById('mainName').textContent);
    } else {
        loadContacts();
    }
}, 5000);

loadContacts();
</script>
</body>
</html>
