<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Atendimento WhatsApp</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;height:100vh;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:350px;background:#fff;border-right:1px solid #ddd;display:flex;flex-direction:column}
.sidebar-header{padding:16px;border-bottom:1px solid #ddd}
.sidebar-header h2{font-size:18px;display:flex;justify-content:space-between}
.search{padding:12px;border-bottom:1px solid #ddd}
.search input{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px}
.tabs{display:flex;border-bottom:1px solid #ddd}
.tab{flex:1;padding:10px;text-align:center;cursor:pointer;background:none;border:none}
.tab.active{color:#075e54;border-bottom:2px solid #075e54}
.conv-list{flex:1;overflow-y:auto}
.conv-item{display:flex;align-items:center;padding:12px;cursor:pointer;border-bottom:1px solid #f0f0f0}
.conv-item:hover{background:#f5f5f5}
.conv-item.active{background:#e8f5e9}
.avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;margin-right:12px;flex-shrink:0}
.conv-info{flex:1}
.conv-name{font-weight:500;font-size:14px}
.conv-number{font-size:11px;color:#666}
.badge{font-size:10px;padding:2px 6px;border-radius:4px;display:inline-block}
.badge-pendente{background:#fff3cd;color:#856404}
.badge-ativo{background:#d4edda;color:#155724}
.main{flex:1;display:flex;flex-direction:column}
.chat-header{background:#fff;padding:12px 16px;border-bottom:1px solid #ddd;display:flex;align-items:center;gap:12px}
.chat-info{flex:1}
.chat-name{font-weight:600;font-size:16px}
.chat-number{font-size:11px;color:#666}
.status-buttons{display:flex;gap:8px}
.status-btn{padding:6px 12px;border:1px solid #ddd;border-radius:20px;cursor:pointer;background:#fff;font-size:11px}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.message{max-width:70%;padding:8px 12px;border-radius:12px;font-size:13px;position:relative}
.message.out{background:#dcf8c6;align-self:flex-end}
.message.in{background:#fff;align-self:flex-start;border:1px solid #ddd}
.message-time{font-size:9px;color:#999;margin-top:4px;text-align:right}
.message-media{max-width:70%;margin:4px 0}
.message-media.out{align-self:flex-end}
.message-media.in{align-self:flex-start}
.message-media img{max-width:100%;border-radius:12px;cursor:pointer;max-height:300px}
.message-media audio{width:250px;border-radius:12px}
.message-media video{max-width:100%;border-radius:12px}
.input-area{padding:12px;background:#fff;border-top:1px solid #ddd}
.number-input-area{margin-bottom:10px}
.number-input-area input{width:100%;padding:10px;border:1px solid #ddd;border-radius:20px;font-size:14px;background:#f8f8f8}
.input-tools{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.tool-btn{background:#f0f0f0;border:none;padding:6px 12px;border-radius:20px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:4px}
.input-row{display:flex;gap:8px}
.input-row textarea{flex:1;padding:10px;border:1px solid #ddd;border-radius:20px;resize:none;font-family:inherit;font-size:14px}
.input-row button{background:#075e54;color:#fff;border:none;border-radius:20px;padding:0 20px;cursor:pointer;font-weight:bold}
.right-panel{width:280px;background:#fff;border-left:1px solid #ddd;padding:16px}
.detail-row{margin-bottom:12px}
.empty-state{display:flex;flex:1;align-items:center;justify-content:center;color:#999;flex-direction:column;gap:12px}
.loading{padding:20px;text-align:center;color:#999}
.spin{display:inline-block;width:20px;height:20px;border:2px solid #ddd;border-top-color:#075e54;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;background:#333;color:#fff;padding:10px 16px;border-radius:8px;z-index:1000;opacity:0;transition:opacity 0.3s}
.toast.show{opacity:1}
.file-input{display:none}
.recording{background:#ff4444;color:white;}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header"><h2>💬 Atendimento <button onclick="loadChats()" style="background:none;border:none;cursor:pointer">🔄</button></h2></div>
    <div class="search"><input type="text" id="searchInput" placeholder="Buscar contato..." oninput="filterChats()"></div>
    <div class="tabs">
      <button class="tab active" onclick="setTab('all',this)">Todas</button>
      <button class="tab" onclick="setTab('pendente',this)">Pendentes</button>
      <button class="tab" onclick="setTab('em_atendimento',this)">Ativas</button>
    </div>
    <div class="conv-list" id="convList"><div class="loading"><div class="spin"></div><br>Carregando...</div></div>
  </div>
  <div class="main">
    <div class="chat-header" id="chatHeader" style="display:none">
      <div class="avatar" id="headerAvatar" style="background:#ccc">--</div>
      <div class="chat-info">
        <div class="chat-name" id="chatName">-</div>
        <div class="chat-number" id="chatNumber">-</div>
      </div>
      <div class="status-buttons">
        <button class="status-btn" onclick="updateStatus('pendente')">⏳ Pendente</button>
        <button class="status-btn" onclick="updateStatus('em_atendimento')">▶ Atender</button>
      </div>
    </div>
    <div class="messages" id="messagesArea"><div class="empty-state">💬 Selecione uma conversa</div></div>
    <div class="input-area" id="inputArea" style="display:none">
      <div class="number-input-area">
        <input type="text" id="manualNumber" placeholder="📱 Digite o número do WhatsApp (ex: 5511988887777)">
      </div>
      <div class="input-tools">
        <button class="tool-btn" onclick="document.getElementById('imageInput').click()">📷 Imagem</button>
        <button class="tool-btn" onclick="document.getElementById('videoInput').click()">🎥 Vídeo</button>
        <button class="tool-btn" id="audioRecordBtn" onclick="toggleRecording()">🎙️ Gravar Áudio</button>
        <button class="tool-btn" onclick="document.getElementById('docInput').click()">📎 Documento</button>
      </div>
      <div class="input-row">
        <textarea id="messageInput" placeholder="Digite sua mensagem..." rows="2" onkeydown="if(event.key=='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
        <button onclick="sendMessage()">Enviar 📤</button>
      </div>
    </div>
    <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="sendMedia(this, 'image')">
    <input type="file" id="videoInput" accept="video/*" style="display:none" onchange="sendMedia(this, 'video')">
    <input type="file" id="docInput" accept=".pdf,.doc,.docx,.txt,.xls,.xlsx" style="display:none" onchange="sendMedia(this, 'document')">
  </div>
  <div class="right-panel">
    <h4>📋 Detalhes</h4>
    <div class="detail-row"><b>Nome:</b> <span id="detailName">-</span></div>
    <div class="detail-row"><b>Número:</b> <span id="detailNumber">-</span></div>
  </div>
</div>
<div id="toast" class="toast"></div>

<script>
const BASE_URL = "https://evolution-api-wc6p.srv1726422.hstgr.cloud";
const API_KEY = "@Alvesm1986";
const INSTANCE = "agoravai";

let chats = [];
let currentChat = null;
let currentFilter = '';
let currentTab = 'all';
let statusMap = JSON.parse(localStorage.getItem('chat_status') || '{}');
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show';
  setTimeout(() => toast.classList.remove('show'), 3000);
}

async function apiRequest(endpoint, method = 'POST', body = null) {
  const url = `${BASE_URL}${endpoint}`;
  const headers = { 'apikey': API_KEY, 'Content-Type': 'application/json' };
  const options = { method, headers };
  if (body) options.body = JSON.stringify(body);
  const resp = await fetch(url, options);
  const data = await resp.json();
  if (!resp.ok) throw new Error(data.message || data.error || `HTTP ${resp.status}`);
  return data;
}

// Função para baixar media da Evolution API
async function downloadMediaUrl(mediaUrl) {
  if (!mediaUrl) return null;
  try {
    const response = await fetch(`${BASE_URL}${mediaUrl}`, {
      headers: { 'apikey': API_KEY }
    });
    const blob = await response.blob();
    return URL.createObjectURL(blob);
  } catch(err) {
    console.error('Erro ao baixar media:', err);
    return null;
  }
}

function formatTimestamp(timestamp) {
  if (!timestamp) return '';
  const date = new Date(timestamp * 1000);
  const now = new Date();
  const isToday = date.toDateString() === now.toDateString();
  if (isToday) {
    return date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  } else {
    return date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
  }
}

async function renderMessageContent(msg) {
  const isFromMe = msg.key?.fromMe === true || msg.fromMe === true;
  const dir = isFromMe ? 'out' : 'in';
  const timestamp = formatTimestamp(msg.messageTimestamp || msg.timestamp);
  
  // Mensagem de texto
  let text = msg.message?.conversation || msg.message?.extendedTextMessage?.text || msg.text || msg.body || msg.content;
  if (text) {
    return `<div class="message ${dir}">${escapeHtml(text)}<div class="message-time">${timestamp}</div></div>`;
  }
  
  // Imagem
  if (msg.message?.imageMessage) {
    const caption = msg.message.imageMessage.caption || '';
    const mediaKey = msg.message.imageMessage.url || msg.message.imageMessage.directPath;
    let imageUrl = '';
    if (mediaKey) {
      imageUrl = await downloadMediaUrl(mediaKey);
    }
    return `
      <div class="message-media ${dir}">
        ${caption ? `<div class="message ${dir}" style="margin-bottom:4px">${escapeHtml(caption)}</div>` : ''}
        ${imageUrl ? `<img src="${imageUrl}" alt="Imagem" onclick="window.open('${imageUrl}')" loading="lazy">` : '📷 Imagem (carregando...)'}
        <div class="message-time">${timestamp}</div>
      </div>
    `;
  }
  
  // Áudio/Voz
  if (msg.message?.audioMessage) {
    const mediaKey = msg.message.audioMessage.url || msg.message.audioMessage.directPath;
    let audioUrl = '';
    if (mediaKey) {
      audioUrl = await downloadMediaUrl(mediaKey);
    }
    return `
      <div class="message-media ${dir}">
        <audio controls src="${audioUrl}"></audio>
        <div class="message-time">${timestamp}</div>
      </div>
    `;
  }
  
  // Vídeo
  if (msg.message?.videoMessage) {
    const caption = msg.message.videoMessage.caption || '';
    const mediaKey = msg.message.videoMessage.url || msg.message.videoMessage.directPath;
    let videoUrl = '';
    if (mediaKey) {
      videoUrl = await downloadMediaUrl(mediaKey);
    }
    return `
      <div class="message-media ${dir}">
        ${caption ? `<div class="message ${dir}" style="margin-bottom:4px">${escapeHtml(caption)}</div>` : ''}
        <video controls src="${videoUrl}"></video>
        <div class="message-time">${timestamp}</div>
      </div>
    `;
  }
  
  // Documento
  if (msg.message?.documentMessage) {
    const fileName = msg.message.documentMessage.fileName || 'Documento';
    const mediaKey = msg.message.documentMessage.url || msg.message.documentMessage.directPath;
    let docUrl = '';
    if (mediaKey) {
      docUrl = await downloadMediaUrl(mediaKey);
    }
    return `
      <div class="message ${dir}">
        📎 <a href="${docUrl}" target="_blank" style="color:#075e54">${escapeHtml(fileName)}</a>
        <div class="message-time">${timestamp}</div>
      </div>
    `;
  }
  
  // Sticker / GIF
  if (msg.message?.stickerMessage) {
    const mediaKey = msg.message.stickerMessage.url || msg.message.stickerMessage.directPath;
    let stickerUrl = '';
    if (mediaKey) {
      stickerUrl = await downloadMediaUrl(mediaKey);
    }
    return `
      <div class="message-media ${dir}">
        <img src="${stickerUrl}" alt="Sticker/GIF" style="max-width:150px; border-radius:12px">
        <div class="message-time">${timestamp}</div>
      </div>
    `;
  }
  
  return null;
}

// Função para gravar áudio do microfone
async function toggleRecording() {
  const btn = document.getElementById('audioRecordBtn');
  
  if (!isRecording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      
      mediaRecorder.ondataavailable = event => {
        audioChunks.push(event.data);
      };
      
      mediaRecorder.onstop = async () => {
        const audioBlob = new Blob(audioChunks, { type: 'audio/mp4' });
        const file = new File([audioBlob], 'audio.mp4', { type: 'audio/mp4' });
        
        // Envia o áudio gravado
        await sendAudioBlob(file);
        
        // Para todas as tracks
        stream.getTracks().forEach(track => track.stop());
      };
      
      mediaRecorder.start();
      isRecording = true;
      btn.textContent = '⏹️ Parar Gravação';
      btn.style.background = '#ff4444';
      btn.style.color = 'white';
      showToast('Gravando... Clique em "Parar" quando terminar');
    } catch(err) {
      showToast('Erro ao acessar microfone: ' + err.message);
    }
  } else {
    mediaRecorder.stop();
    isRecording = false;
    btn.textContent = '🎙️ Gravar Áudio';
    btn.style.background = '#f0f0f0';
    btn.style.color = 'black';
  }
}

async function sendAudioBlob(audioBlob) {
  let numberToSend = '';
  let manualNumber = document.getElementById('manualNumber').value.trim();
  
  if (manualNumber) {
    let cleanNumber = manualNumber.replace(/\D/g, '');
    if (!cleanNumber.startsWith('55') && cleanNumber.length === 11) cleanNumber = '55' + cleanNumber;
    numberToSend = cleanNumber;
  } else if (currentChat) {
    numberToSend = currentChat.id;
  } else {
    showToast('Digite um número ou selecione uma conversa');
    return;
  }
  
  const reader = new FileReader();
  reader.onloadend = async function() {
    const base64 = reader.result.split(',')[1];
    showToast('Enviando áudio...');
    
    try {
      const encoded = encodeURIComponent(INSTANCE);
      const response = await fetch(`${BASE_URL}/message/sendWhatsAppAudio/${encoded}`, {
        method: 'POST',
        headers: { 'apikey': API_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ number: numberToSend, audio: base64 })
      });
      
      if (!response.ok) throw new Error('Erro ao enviar');
      showToast('Áudio enviado! ✅');
      setTimeout(() => { if (currentChat) loadMessages(currentChat.id); }, 2000);
    } catch(err) { showToast(`Erro: ${err.message}`); }
  };
  reader.readAsDataURL(audioBlob);
}

function formatNumber(num) {
  if (!num) return '';
  if (num.includes('@')) {
    const clean = num.split('@')[0];
    if (clean.length === 11) return `+55 (${clean.slice(2,4)}) ${clean.slice(4,9)}-${clean.slice(9)}`;
    return clean;
  }
  const c = num.replace(/\D/g, '');
  if (c.length === 11) return `+55 (${c.slice(2,4)}) ${c.slice(4,9)}-${c.slice(9)}`;
  return c;
}

function escapeHtml(t) { if(!t) return ''; const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
function getColor(str) { let h=0; for(let i=0;i<str.length;i++) h=((h<<5)-h)+str.charCodeAt(i); const colors=['#9FE1CB','#B5D4F4','#FAC775','#F4C0D1','#D4E0FF']; return colors[Math.abs(h)%colors.length]; }

async function resolveLIDtoNumber(lid) {
  try {
    const encoded = encodeURIComponent(INSTANCE);
    const response = await fetch(`${BASE_URL}/contact/findContacts/${encoded}`, {
      method: 'POST',
      headers: { 'apikey': API_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ where: { remoteJid: lid } })
    });
    const data = await response.json();
    if (data && data.length > 0 && data[0].id) {
      return { number: data[0].id.split('@')[0], name: data[0].pushName || data[0].name };
    }
    return null;
  } catch(err) { return null; }
}

async function loadChats() {
  try {
    const encoded = encodeURIComponent(INSTANCE);
    const data = await apiRequest(`/chat/findChats/${encoded}`, 'POST', { where: {} });
    let rawChats = [];
    if (Array.isArray(data)) rawChats = data;
    else if (data?.records) rawChats = data.records;
    else if (data?.chats) rawChats = data.chats;
    
    const uniqueChats = new Map();
    for (const chat of rawChats) {
      const remoteJid = chat.remoteJid || chat.id || chat.jid;
      if (!remoteJid) continue;
      let displayNumber = '', displayName = '';
      
      if (chat.lastMessage?.key?.remoteJidAlt) {
        displayNumber = chat.lastMessage.key.remoteJidAlt.split('@')[0];
        displayName = chat.pushName || chat.name || chat.senderName || displayNumber;
      } else if (remoteJid.includes('@s.whatsapp.net') || remoteJid.includes('@c.us')) {
        displayNumber = remoteJid.split('@')[0];
        displayName = chat.pushName || chat.name || chat.senderName || displayNumber;
      } else if (remoteJid.includes('@lid')) {
        const resolved = await resolveLIDtoNumber(remoteJid);
        if (resolved && resolved.number) {
          displayNumber = resolved.number;
          displayName = resolved.name || displayNumber;
        } else {
          displayNumber = remoteJid.split('@')[0].slice(-8);
          displayName = chat.pushName || chat.name || `Contato ${displayNumber}`;
        }
      }
      
      if (!uniqueChats.has(remoteJid)) {
        uniqueChats.set(remoteJid, { id: remoteJid, number: displayNumber, name: displayName });
      }
    }
    chats = Array.from(uniqueChats.values());
    renderChatList();
  } catch(err) { console.error(err); }
}

function renderChatList() {
  const container = document.getElementById('convList');
  let filtered = chats.filter(c => {
    if (currentFilter && !c.name.toLowerCase().includes(currentFilter.toLowerCase()) && !c.number.includes(currentFilter)) return false;
    const s = statusMap[c.id] || 'pendente';
    if (currentTab !== 'all' && s !== currentTab) return false;
    return true;
  });
  if (filtered.length === 0) { container.innerHTML = '<div class="loading">Nenhuma conversa</div>'; return; }
  
  let html = '';
  for (const c of filtered) {
    const s = statusMap[c.id] || 'pendente';
    const sc = s === 'em_atendimento' ? 'badge-ativo' : 'badge-pendente';
    const st = s === 'em_atendimento' ? 'Ativo' : 'Pendente';
    const bg = getColor(c.id);
    const active = currentChat?.id === c.id ? 'active' : '';
    html += `<div class="conv-item ${active}" onclick="selectChat('${c.id.replace(/'/g,"\\'")}')">
      <div class="avatar" style="background:${bg}">${c.name.substring(0,2).toUpperCase()}</div>
      <div class="conv-info">
        <div class="conv-name">${escapeHtml(c.name)}</div>
        <div class="conv-number">${escapeHtml(formatNumber(c.number))}</div>
        <div style="margin-top:4px"><span class="badge ${sc}">${st}</span></div>
      </div>
    </div>`;
  }
  container.innerHTML = html;
}

async function selectChat(id) {
  const chat = chats.find(c => c.id === id);
  if (!chat) return;
  currentChat = chat;
  document.getElementById('chatHeader').style.display = 'flex';
  document.getElementById('inputArea').style.display = 'block';
  document.getElementById('chatName').textContent = chat.name;
  document.getElementById('chatNumber').textContent = formatNumber(chat.number);
  document.getElementById('detailName').textContent = chat.name;
  document.getElementById('detailNumber').textContent = formatNumber(chat.number);
  document.getElementById('headerAvatar').style.background = getColor(chat.id);
  document.getElementById('headerAvatar').textContent = chat.name.substring(0,2).toUpperCase();
  document.getElementById('manualNumber').value = '';
  document.getElementById('messagesArea').innerHTML = '<div class="loading"><div class="spin"></div><br>Carregando...</div>';
  await loadMessages(chat.id);
  renderChatList();
}

function scrollToBottom() {
  const messagesDiv = document.getElementById('messagesArea');
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

async function loadMessages(chatId) {
  try {
    const encoded = encodeURIComponent(INSTANCE);
    const data = await apiRequest(`/chat/findMessages/${encoded}`, 'POST', { where: { remoteJid: chatId }, limit: 100 });
    let messages = [];
    if (data?.messages?.records) messages = data.messages.records;
    else if (data?.messages && typeof data.messages === 'object') messages = Object.values(data.messages);
    else if (Array.isArray(data)) messages = data;
    
    if (messages.length === 0) { 
      document.getElementById('messagesArea').innerHTML = '<div class="empty-state">💬 Nenhuma mensagem ainda</div>';
      return; 
    }
    
    let html = '';
    for (const m of messages) {
      const rendered = await renderMessageContent(m);
      if (rendered) html += rendered;
    }
    document.getElementById('messagesArea').innerHTML = html;
    setTimeout(scrollToBottom, 100);
  } catch(err) { console.error(err); }
}

async function sendMessage() {
  const input = document.getElementById('messageInput');
  const text = input.value.trim();
  if (!text) { showToast('Digite uma mensagem'); return; }
  
  let numberToSend = '';
  let manualNumber = document.getElementById('manualNumber').value.trim();
  
  if (manualNumber) {
    let cleanNumber = manualNumber.replace(/\D/g, '');
    if (!cleanNumber.startsWith('55') && cleanNumber.length === 11) cleanNumber = '55' + cleanNumber;
    numberToSend = cleanNumber;
  } else if (currentChat) {
    numberToSend = currentChat.id;
  } else {
    showToast('Digite um número ou selecione uma conversa');
    return;
  }
  
  try {
    const encoded = encodeURIComponent(INSTANCE);
    const response = await fetch(`${BASE_URL}/message/sendText/${encoded}`, {
      method: 'POST',
      headers: { 'apikey': API_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ number: numberToSend, text: text, delay: 1200 })
    });
    
    if (!response.ok) throw new Error('Erro ao enviar');
    
    input.value = '';
    showToast('Mensagem enviada! ✅');
    
    const timestamp = formatTimestamp(Math.floor(Date.now() / 1000));
    const container = document.getElementById('messagesArea');
    if (container.innerHTML.includes('Nenhuma mensagem')) container.innerHTML = '';
    container.innerHTML += `<div class="message out">${escapeHtml(text)}<div class="message-time">${timestamp}</div></div>`;
    setTimeout(scrollToBottom, 100);
    
    setTimeout(() => loadChats(), 2000);
    if (currentChat) setTimeout(() => loadMessages(currentChat.id), 2000);
  } catch(err) { showToast(`Erro: ${err.message}`); }
}

async function sendMedia(input, type) {
  if (!currentChat && !document.getElementById('manualNumber').value.trim()) {
    showToast('Selecione uma conversa ou digite um número');
    input.value = '';
    return;
  }
  
  const file = input.files[0];
  if (!file) return;
  showToast(`Enviando ${type}...`);
  
  const reader = new FileReader();
  reader.onloadend = async function() {
    const base64 = reader.result.split(',')[1];
    let numberToSend = '';
    let manualNumber = document.getElementById('manualNumber').value.trim();
    
    if (manualNumber) {
      let cleanNumber = manualNumber.replace(/\D/g, '');
      if (!cleanNumber.startsWith('55') && cleanNumber.length === 11) cleanNumber = '55' + cleanNumber;
      numberToSend = cleanNumber;
    } else if (currentChat) {
      numberToSend = currentChat.id;
    } else {
      showToast('Digite um número ou selecione uma conversa');
      input.value = '';
      return;
    }
    
    try {
      const encoded = encodeURIComponent(INSTANCE);
      let endpoint = `/message/sendMedia/${encoded}`;
      let body = { number: numberToSend, media: base64, mimetype: file.type, fileName: file.name, caption: '' };
      
      const response = await fetch(`${BASE_URL}${endpoint}`, {
        method: 'POST',
        headers: { 'apikey': API_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      
      if (!response.ok) throw new Error('Erro ao enviar');
      showToast(`${type} enviado! ✅`);
      input.value = '';
      setTimeout(() => { if (currentChat) loadMessages(currentChat.id); }, 2000);
    } catch(err) { showToast(`Erro: ${err.message}`); input.value = ''; }
  };
  reader.readAsDataURL(file);
}

function updateStatus(s) {
  if (!currentChat) return;
  statusMap[currentChat.id] = s;
  localStorage.setItem('chat_status', JSON.stringify(statusMap));
  renderChatList();
  showToast(`Status: ${s === 'em_atendimento' ? 'Em atendimento' : 'Pendente'}`);
}
function filterChats() { currentFilter = document.getElementById('searchInput').value; renderChatList(); }
function setTab(tab, btn) { currentTab = tab; document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderChatList(); }

loadChats();
setInterval(() => { loadChats(); if(currentChat) loadMessages(currentChat.id); }, 10000);
</script>
</body>
</html>
